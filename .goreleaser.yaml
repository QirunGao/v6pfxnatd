version: 2

project_name: v6pfxnatd

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: daemon
    main: .
    binary: v6pfxnatd

    goos:
      - linux
    goarch:
      - amd64
      - arm64

    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
      - -buildvcs=false
    tags:
      - osusergo
      - netgo
    ldflags:
      - -s -w -buildid=
    mod_timestamp: "{{ .CommitTimestamp }}"

nfpms:
  - id: linux
    package_name: v6pfxnatd
    formats:
      - deb
      - rpm

    file_name_template: "{{ .ConventionalFileName }}"
    bindir: /usr/sbin

    maintainer: "GQR <noreply@gaoqirun.com>"
    description: "Event-driven nftables IPv6 prefix NAT reconciler for dynamic DHCPv6-PD"
    section: admin
    priority: optional
    vendor: "v6pfxnatd"

    rpm:
      summary: "Event-driven nftables IPv6 prefix NAT reconciler for dynamic DHCPv6-PD"
      group: "Applications/System"
      packager: "GQR <noreply@gaoqirun.com>"

    ids:
      - daemon

    dependencies:
      - systemd

    contents:
      - src: ./README.md
        dst: /usr/share/doc/v6pfxnatd/README.md

      - src: ./config.example.toml
        dst: /etc/v6pfxnatd/config.toml
        type: config|noreplace
        file_info:
          mode: 0600

      - src: ./v6pfxnatd.service
        dst: /lib/systemd/system/v6pfxnatd.service
        packager: deb
        file_info:
          mode: 0644

      - src: ./v6pfxnatd.service
        dst: /usr/lib/systemd/system/v6pfxnatd.service
        packager: rpm
        file_info:
          mode: 0644

      - src: ./v6pfxnatd.conf
        dst: /etc/modules-load.d/v6pfxnatd.conf
        file_info:
          mode: 0644

    scripts:
      postinstall: ./scripts/package/postinst
      postremove: ./scripts/package/postrm

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
